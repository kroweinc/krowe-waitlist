<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a24" />
      <stop offset="1" stop-color="#0e0e14" />
    </linearGradient>
  </defs>

  <!-- Background tile (corners get rounded by the UI) -->
  <rect width="256" height="256" fill="url(#bg)" />

  <!-- Circuit loop: angular layout with a chicane on the top right -->
  <path
    d="M 56 192
       L 48 104
       L 92 52
       L 148 52
       L 164 88
       L 204 96
       L 212 152
       L 176 192
       Z"
    fill="none"
    stroke="#e0884a"
    stroke-width="18"
    stroke-linejoin="round"
  />

  <!-- Start/finish checkered tick on the bottom straight -->
  <g>
    <rect x="106" y="183" width="9" height="9" fill="#f4f4f6" />
    <rect x="115" y="183" width="9" height="9" fill="#0e0e14" />
    <rect x="106" y="192" width="9" height="9" fill="#0e0e14" />
    <rect x="115" y="192" width="9" height="9" fill="#f4f4f6" />
  </g>

  <!-- Car on the right straight -->
  <circle cx="209" cy="128" r="10" fill="#f4f4f6" stroke="#0e0e14" stroke-width="4" />
</svg>
